services:
  - type: web
    name: telegram-story-userbot
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: bash start_bot.sh
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.7
      - key: API_ID
        sync: false
      - key: API_HASH
        sync: false
      - key: STRING_SESSION
        sync: false
      - key: WATCH_GROUP
        sync: false
      - key: MIN_CAPTION_GAP
        value: 3
      - key: MIN_STORY_DELAY
        value: 300
      - key: MAX_STORIES_PER_HOUR
        value: 5
      - key: LOG_LEVEL
        value: INFO
    disk:
      name: data
      mountPath: /opt/render/project/data
      sizeGB: 1
